<?php
session_start();
include("db_connection.php");

$error = "";

if ($_SERVER["REQUEST_METHOD"] == "POST") {
    $email = trim($_POST['email']);
    $password = trim($_POST['password']);

    if (empty($email) || empty($password)) {
        $error = "All fields are required.";
    } else {
        // Check admin first
        $adminQuery = "SELECT * FROM admin WHERE email='$email' AND password='$password'";
        $adminResult = mysqli_query($conn, $adminQuery);

        if (mysqli_num_rows($adminResult) == 1) {
            $_SESSION['admin_email'] = $email;
            header("Location: admin_dashboard.php");
            exit;
        }

        // Check customer
        $custQuery = "SELECT * FROM customer WHERE email='$email' AND password='$password'";
        $custResult = mysqli_query($conn, $custQuery);

        if (mysqli_num_rows($custResult) == 1) {
            $_SESSION['cust_email'] = $email;
            header("Location: customer_dashboard.php");
            exit;
        }

        // If neither matches
        $error = "Invalid credentials. Please register as a new customer.";
    }
}
